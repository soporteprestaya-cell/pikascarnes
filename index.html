<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Pikascarne">
<meta name="theme-color" content="#c0392b">
<title>Pikascarne Dominicana</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#f5f4f2;color:#1a1a1a}
input,select{width:100%;font-size:16px;padding:11px 13px;border:1.5px solid #e0e0e0;border-radius:12px;background:#fff;color:#1a1a1a;outline:none;-webkit-appearance:none}
input:focus,select:focus{border-color:#c0392b;box-shadow:0 0 0 3px rgba(192,57,43,.12)}
.btn{cursor:pointer;font-size:15px;border-radius:12px;border:1.5px solid #ddd;background:#fff;color:#1a1a1a;padding:12px 16px;width:100%;margin-top:8px;display:block;text-align:center;text-decoration:none}
.btn-red{background:#c0392b;border-color:#c0392b;color:#fff;font-weight:600}
.btn-outline{border-color:#c0392b;color:#c0392b;background:#fff}
.btn-gray{background:#f0efed;border-color:#ddd;color:#555}
.btn-green{background:#1D9E75;border-color:#1D9E75;color:#fff;font-weight:600}
.btn-wa{background:#25D366;border-color:#25D366;color:#fff}
.btn-blue{background:#007AFF;border-color:#007AFF;color:#fff}
.btn-sm{padding:7px 13px;font-size:13px;width:auto;margin-top:0;display:inline-block}
.card{background:#fff;border-radius:16px;padding:16px;margin-bottom:12px;border:1px solid #ebebeb}
.topbar{background:#c0392b;color:#fff;padding:12px 14px;display:flex;align-items:center;gap:10px;position:fixed;top:0;left:0;right:0;z-index:50;min-height:56px}
.topbar img{height:30px;border-radius:5px;object-fit:contain;background:#fff;padding:2px 5px}
.ttitle{font-size:14px;font-weight:700;flex:1}
.rbadge{font-size:10px;background:rgba(255,255,255,.25);padding:3px 9px;border-radius:20px;white-space:nowrap}
.tabs{display:flex;background:#fff;border-bottom:1.5px solid #ebebeb;overflow-x:auto;position:fixed;left:0;right:0;z-index:49;top:56px}
.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;padding:11px 14px;font-size:12px;border:none;background:none;color:#999;border-bottom:2.5px solid transparent;cursor:pointer;white-space:nowrap;font-weight:500}
.tab.active{color:#c0392b;font-weight:700;border-bottom-color:#c0392b}
.page{position:fixed;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 40px;top:104px}
.metric{background:#f5f4f2;border-radius:12px;padding:13px 10px;text-align:center}
.ml{font-size:10px;color:#888;margin-bottom:3px;font-weight:500}
.mv{font-size:19px;font-weight:700}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.lbl{font-size:12px;color:#555;display:block;margin-bottom:5px;font-weight:600}
.field{margin-bottom:12px}
.pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
.row{display:flex;justify-content:space-between;align-items:center}
.abox{background:#fef2f2;border:1.5px solid #fca5a5;border-radius:12px;padding:11px 13px;margin-bottom:12px;font-size:13px;color:#991b1b;line-height:1.6}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:#fff;border-radius:22px 22px 0 0;padding:20px 16px 30px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto}
.sh{width:38px;height:4px;background:#e0e0e0;border-radius:2px;margin:0 auto 18px}
.ocard{border:1.5px solid #ebebeb;border-radius:14px;padding:13px;margin-bottom:10px;background:#fff}
.ocard.venc{border-color:#fca5a5;background:#fff8f8}
.login-wrap{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;background:#c0392b;overflow-y:auto}
.lcard{background:#fff;border-radius:22px;padding:26px 20px;width:100%;max-width:360px;box-shadow:0 24px 60px rgba(0,0,0,.25)}
.pin-row{display:flex;justify-content:center;gap:12px;margin:14px 0}
.pdot{width:15px;height:15px;border-radius:50%;border:2px solid #ddd;background:transparent}
.pdot.on{background:#c0392b;border-color:#c0392b}
.numpad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px}
.nk{padding:17px 8px;border:1.5px solid #ebebeb;border-radius:14px;background:#fff;font-size:20px;font-weight:700;cursor:pointer;text-align:center}
.nk:active{background:#f5f4f2}
.nk.del{color:#c0392b;font-size:15px}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.rbtn{padding:15px 8px;border:2px solid #ebebeb;border-radius:16px;background:#fff;text-align:center;cursor:pointer}
.rbtn.on{border-color:#c0392b;background:#fff5f5}
.ri{font-size:28px;margin-bottom:6px}
.rn{font-size:12px;font-weight:700}
.pchip{display:inline-flex;align-items:center;gap:5px;padding:8px 14px;border-radius:20px;font-size:13px;font-weight:600;cursor:pointer;border:2px solid #ddd;background:#fff;margin-right:8px;margin-top:6px}
.pchip.efe{background:#E1F5EE;border-color:#1D9E75;color:#085041}
.pchip.tra{background:#EEEDFE;border-color:#7F77DD;color:#3C3489}
.pchip.pen{background:#FAEEDA;border-color:#BA7517;color:#633806}
.fbox{border:2px dashed #ddd;border-radius:14px;padding:20px;text-align:center;cursor:pointer;background:#fafafa;margin-top:8px}
.fthumb{width:100%;max-height:180px;object-fit:contain;border-radius:12px;border:1px solid #ebebeb;margin-top:10px;cursor:pointer;display:block}
.cobadge{display:inline-flex;align-items:center;gap:5px;background:#E1F5EE;border:1.5px solid #86efac;padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;color:#085041}
.sdot{width:7px;height:7px;border-radius:50%;background:#4ade80;display:inline-block;margin-left:5px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
</style>
</head>

function dl(due){return Math.ceil((new Date(due)-new Date(td()))/86400000);}
function iv(p){return p.due&&p.status!=="cobrado"&&dl(p.due)<0;}
function df(date,type){var d=new Date(date);if(type==="c1")d.setDate(d.getDate()+7);else if(type==="c4")d.setDate(d.getDate()+28);else return null;return d.toISOString().split("T")[0];}
var DE={camion:"Camion",motor:"Motor",recoge:"Recoge"};
var DEI={camion:"TRK",motor:"MTR",recoge:"TDA"};
var PN={contado:"Contado",c1:"Credito 1 sem.",c4:"Credito 1 mes"};
var SN={pendiente:"Pendiente",despachado:"Despachado",credito:"Credito",cobrado:"Cobrado",entregado:"Entregado"};
var SB={
  pendiente:{bg:"#FAEEDA",c:"#633806"},
  despachado:{bg:"#EEEDFE",c:"#3C3489"},
  cobrado:{bg:"#E1F5EE",c:"#085041"},
  credito:{bg:"#fef2f2",c:"#991b1b"},
  entregado:{bg:"#dbeafe",c:"#1e40af"},
  vencido:{bg:"#c0392b",c:"#fff"}
};
var ROLES={
  admin:{label:"Supervisor",icon:"ADM",pin:"1234"},
  vendedor:{label:"Vendedor",icon:"VND",pin:"5678"},
  camion:{label:"Camion",icon:"TRK",pin:"9012"},
  socio:{label:"Secretaria",icon:"SOC",pin:"3456"}
};
var S={role:null,sn:"",tab:"",modal:null,pin:"",sr:null,apf:"nuevos",sff:"pendiente",np:{},vp:{}};
var D={sellers:[],products:[],pedidos:[]};
var LI=null;

function toast(msg,dur){
  dur=dur||2600;
  var t=document.getElementById("toast");
  t.textContent=msg;t.style.opacity=1;
  setTimeout(function(){t.style.opacity=0;},dur);
}

function sync(){
  if(LI){DB.ref("pk").off("value",LI);LI=null;}
  LI=DB.ref("pk").on("value",function(snap){
    var d=snap.val()||{};
    D.sellers=d.sellers?Object.values(d.sellers):[];
    D.products=d.products?Object.values(d.products):[];
    D.pedidos=d.pedidos?Object.values(d.pedidos):[];
    render();
    var l=document.getElementById("app-loading");
    if(l)l.style.display="none";
  });
}

function unsync(){if(LI){DB.ref("pk").off("value",LI);LI=null;}}

function save(path,arr){
  var obj=arr.reduce(function(o,v,i){o[i]=v;return o;},{});
  return DB.ref("pk/"+path).set(obj);
}

function render(){
  document.getElementById("root").innerHTML=!S.role?login():app();
  if(S.modal)document.getElementById("root").insertAdjacentHTML("beforeend",modal());
}

function login(){
  var r=S.sr;
  var dots=[0,1,2,3].map(function(i){return '<div class="pdot'+(S.pin.length>i?" on":"")+'"></div>';}).join("");
  var rbtn=Object.keys(ROLES).map(function(k){var v=ROLES[k];return '<div class="rbtn'+(S.sr===k?" on":"")+'" onclick="S.sr=\''+k+'\';S.pin=\'\';render()"><div class="ri">'+v.icon+'</div><div class="rn">'+v.label+'</div></div>';}).join("");
  var nks=[1,2,3,4,5,6,7,8,9,"",0,"X"].map(function(k){return '<button class="nk'+(k==="X"?" del":"")+'" onclick="pp(\''+k+'\')">'+( k==="X"?"DEL":k)+'</button>';}).join("");
  var ps=r?('<p style="text-align:center;font-size:12px;color:#888;margin-bottom:2px;font-weight:600">Ingresa tu PIN</p><div class="pin-row">'+dots+'</div>'+(S.pin.length===4&&S.pin!==ROLES[r].pin?'<p style="text-align:center;font-size:12px;color:#c0392b;margin-bottom:10px">PIN incorrecto</p>':'')+'<div class="numpad">'+nks+'</div>'):'<p style="text-align:center;font-size:12px;color:#bbb;margin-top:10px">Selecciona tu rol</p>';
  return '<div class="login-wrap"><div class="lcard"><div style="text-align:center;margin-bottom:20px"><div style="background:#c0392b;color:#fff;padding:10px 22px;border-radius:12px;display:inline-block;font-size:22px;font-weight:900">PIKASCARNE</div><div style="font-size:10px;color:#bbb;margin-top:4px">DOMINICANA S.R.L. - Carnes Frescas Siempre!</div></div><p style="text-align:center;font-size:13px;color:#888;margin-bottom:14px;font-weight:600">Quien eres?</p><div class="rgrid">'+rbtn+'</div>'+ps+'</div><p style="color:rgba(255,255,255,.35);font-size:11px;margin-top:16px">Pikascarne Dominicana S.R.L.</p></div>';
}

function pp(k){
  if(k==="X"){S.pin=S.pin.slice(0,-1);render();return;}
  if(k===""||S.pin.length>=4)return;
  S.pin+=String(k);
  if(S.pin.length===4){
    var r=S.sr;
    if(S.pin===ROLES[r].pin){
      S.role=r;S.pin="";S.sr=null;
      if(r==="vendedor")S.tab=S.sn?"nuevo":"perfil";
      else if(r==="camion")S.tab="ruta";
      else if(r==="socio")S.tab="facturas";
      else S.tab="pedidos";
      sync();return;
    }render();return;
  }render();
}

function tabs(){
  if(S.role==="admin")return [{id:"pedidos",icon:"LIS",l:"Pedidos"},{id:"cuadre",icon:"GRF",l:"Cuadre"},{id:"productos",icon:"PKG",l:"Productos"},{id:"equipo",icon:"EQP",l:"Equipo"}];
  if(S.role==="vendedor")return [{id:"nuevo",icon:"+",l:"Nuevo"},{id:"mis",icon:"LIS",l:"Mis pedidos"},{id:"perfil",icon:"USR",l:"Perfil"}];
  if(S.role==="camion")return [{id:"ruta",icon:"TRK",l:"Mi ruta"},{id:"entregados",icon:"OK",l:"Entregados"}];
  if(S.role==="socio")return [{id:"facturas",icon:"FAC",l:"Facturas"},{id:"pagos",icon:"PAG",l:"Pagos"}];
  return [];
}

function app(){
  var ri=ROLES[S.role];
  var nv=D.pedidos.filter(function(p){return !p.ok&&p.src==="v";}).length;
  var sf=D.pedidos.filter(function(p){return p.ok&&!p.fi&&p.status!=="cobrado";}).length;
  var th=tabs().map(function(t){
    var b="";
    if(t.id==="pedidos"&&S.role==="admin"&&nv>0)b=' ('+nv+')';
    if(t.id==="facturas"&&S.role==="socio"&&sf>0)b=' ('+sf+')';
    return '<button class="tab'+(S.tab===t.id?" active":"")+'" onclick="S.tab=\''+t.id+'\';render()">'+t.icon+' '+t.l+b+'</button>';
  }).join("");
  return '<div class="topbar"><img src="'+LOGO+'" alt="PK"><div class="ttitle">Pikascarne <span class="sdot"></span></div><span class="rbadge">'+ri.icon+' '+ri.label+'</span><button onclick="S.role=null;S.sn=\'\';unsync();render()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer">Salir</button></div><div class="tabs">'+th+'</div><div class="page">'+page()+'</div>';
}

function page(){
  if(S.role==="admin"){if(S.tab==="pedidos")return apeds();if(S.tab==="cuadre")return acuadre();if(S.tab==="productos")return aprods();if(S.tab==="equipo")return aequipo();}
  if(S.role==="vendedor"){if(S.tab==="nuevo")return vnuevo();if(S.tab==="mis")return vmis();if(S.tab==="perfil")return vperfil();}
  if(S.role==="camion"){if(S.tab==="ruta")return cruta();if(S.tab==="entregados")return cents();}
  if(S.role==="socio"){if(S.tab==="facturas")return sfacts();if(S.tab==="pagos")return spagos();}
  return "";
}

function wf(p,cu){
  if(!p)return "";
  if(p.fi){
    var h='<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;color:#666;margin-bottom:4px">Factura:</div><img src="'+p.fi+'" class="fthumb" onclick="window.open(this.src)">';
    if(p.fn)h+='<div style="font-size:11px;color:#888;margin-top:5px">'+p.fn+'</div>';
    if(cu)h+='<button class="btn btn-sm btn-gray" style="margin-top:8px" onclick="S.modal={type:\'F\',id:\''+p.id+'\'};render()">Cambiar factura</button>';
    return h+'</div>';
  }
  if(cu)return '<div class="fbox" onclick="S.modal={type:\'F\',id:\''+p.id+'\'};render()"><div style="font-size:26px">FAC</div><div style="font-size:13px;color:#888;margin-top:6px">Toca para subir factura</div></div>';
  return '<div style="margin-top:6px;font-size:12px;color:#bbb">Factura pendiente</div>';
}

function pc(p){
  var h='<div class="ocard'+(iv(p)?" venc":"")+'"><div class="row" style="margin-bottom:4px"><span style="font-weight:700;font-size:14px">'+DEI[p.dv||"camion"]+" "+p.cl+'</span><span style="font-weight:700;font-size:14px">'+fmt(p.am)+'</span></div>';
  h+='<div style="font-size:12px;color:#888;margin-bottom:2px">'+p.sl+' - '+p.dt+'</div>';
  h+='<div style="font-size:13px;color:#555;margin-bottom:5px">'+p.ds+'</div>';
  if(p.lo)h+='<div style="font-size:12px;color:#777;margin-bottom:4px">DIR '+p.lo+'</div>';
  if(p.ph)h+='<div style="font-size:12px;color:#777;margin-bottom:4px">TEL '+p.ph+'</div>';
  var st=iv(p)?"vencido":p.status;var ss=SB[st]||{};
  h+='<div class="row" style="margin-bottom:10px"><span class="pill" style="background:'+ss.bg+';color:'+ss.c+'">'+SN[st]+'</span><span style="font-size:11px;color:#aaa">'+PN[p.pt]+'</span></div>';
  return h;
}

function apeds(){
  var f=S.apf||"nuevos";
  var nv=D.pedidos.filter(function(p){return !p.ok&&p.src==="v";}).length;
  var list=D.pedidos.filter(function(p){
    if(f==="nuevos")return !p.ok&&p.src==="v";
    if(f==="venc")return iv(p);
    if(f==="todos")return true;
    if(f==="sf")return p.ok&&!p.fi&&p.status!=="cobrado";
    return p.status===f;
  }).slice().reverse();
  var fn={"nuevos":"Nuevos","pendiente":"Pendientes","sf":"Sin factura","despachado":"Despachados","cobrado":"Cobrados","venc":"Vencidos","todos":"Todos"};
  var fb=["nuevos","pendiente","sf","despachado","cobrado","venc","todos"].map(function(x){return '<button class="btn btn-sm '+((S.apf||"nuevos")===x?"btn-red":"btn-gray")+'" onclick="S.apf=\''+x+'\';render()" style="white-space:nowrap">'+fn[x]+'</button>';}).join("");
  var cards=list.map(function(p){
    var h=pc(p)+wf(p,true);
    if(!p.ok&&p.src==="v")h+='<button class="btn btn-green" style="margin-top:10px" onclick="ap(\''+p.id+'\')">Aprobar pedido</button>';
    h+='<div style="display:flex;gap:8px;margin-top:8px"><button class="btn btn-sm btn-outline" style="flex:1" onclick="S.modal={type:\'E\',id:\''+p.id+'\'};render()">Editar</button><button class="btn btn-sm btn-gray" style="flex:1;color:#c0392b" onclick="dp(\''+p.id+'\')">Borrar</button></div></div>';
    return h;
  }).join("");
  return '<div class="g2"><div class="metric"><div class="ml">Activos</div><div class="mv">'+D.pedidos.filter(function(p){return p.status!=="cobrado";}).length+'</div></div><div class="metric"><div class="ml">Nuevos</div><div class="mv" style="color:#c0392b">'+nv+'</div></div></div>'+(nv>0?'<div class="abox">'+nv+' pedido'+(nv>1?"s":"")+" nuevo"+(nv>1?"s":"")+" de vendedores</div>":"")+'<div style="display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;padding-bottom:2px">'+fb+'</div><button class="btn btn-outline" style="margin-bottom:12px" onclick="S.modal={type:\'SH\'};render()">Enviar al socio</button>'+(list.length===0?'<div style="text-align:center;color:#bbb;padding:50px 0;font-size:14px">Sin pedidos</div>':cards);
}

function ap(id){var i=D.pedidos.findIndex(function(p){return p.id===id;});if(i<0)return;D.pedidos[i].ok=true;save("pedidos",D.pedidos).then(function(){toast("Aprobado");});}
function dp(id){if(!confirm("Eliminar?"))return;D.pedidos=D.pedidos.filter(function(p){return p.id!==id;});save("pedidos",D.pedidos).then(function(){toast("Eliminado");});}

function acuadre(){
  var bS={};D.pedidos.forEach(function(p){if(!bS[p.sl])bS[p.sl]={n:0,t:0,c:0};bS[p.sl].n++;bS[p.sl].t+=p.am;if(p.status==="cobrado")bS[p.sl].c+=p.am;});
  var tot=D.pedidos.reduce(function(a,p){return a+p.am;},0);
  var cob=D.pedidos.filter(function(p){return p.status==="cobrado";}).reduce(function(a,p){return a+p.am;},0);
  var rows=Object.keys(bS).map(function(n){var d=bS[n];return '<div style="border-bottom:1px solid #f0f0f0;padding:10px 0"><div class="row"><strong>'+n+'</strong><strong>'+fmt(d.t)+'</strong></div><div style="font-size:12px;color:#888;margin-top:3px">'+d.n+' pedidos - cobrado: <span style="color:#1D9E75">'+fmt(d.c)+'</span></div></div>';}).join("")||'<div style="color:#bbb;text-align:center;padding:20px">Sin datos</div>';
  return '<div class="g2"><div class="metric"><div class="ml">Total</div><div class="mv">'+fmt(tot)+'</div></div><div class="metric"><div class="ml">Cobrado</div><div class="mv" style="color:#1D9E75">'+fmt(cob)+'</div></div></div><button class="btn btn-outline" style="margin-bottom:12px" onclick="cc()">Copiar resumen</button><div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:12px">Por vendedor</div>'+rows+'</div>';
}

function cc(){
  var bS={};D.pedidos.forEach(function(p){if(!bS[p.sl])bS[p.sl]={n:0,t:0};bS[p.sl].n++;bS[p.sl].t+=p.am;});
  var tot=D.pedidos.reduce(function(a,p){return a+p.am;},0);
  var txt="CUADRE - PIKASCARNE DOMINICANA\n"+new Date().toLocaleDateString("es-DO")+"\n---\n";
  Object.keys(bS).forEach(function(n){txt+=n+": "+bS[n].n+" pedidos - "+fmt(bS[n].t)+"\n";});
  txt+="\nTOTAL: "+fmt(tot);
  navigator.clipboard.writeText(txt).then(function(){toast("Copiado");}).catch(function(){toast("Error");});
}

function aprods(){
  var np=S.np||{};var c=parseFloat(np.co)||0,ts=parseFloat(np.ts)||0,tc=parseFloat(np.tc)||0;
  var prev=c&&ts&&tc?'<div style="font-size:12px;color:#555;background:#f5f4f2;padding:8px 12px;border-radius:10px;margin-bottom:12px">RD$'+c+'  +'+(ts-c)+' tuyo  RD$'+ts+'  +'+(tc-ts)+' vend  RD$'+tc+'</div>':"";
  var pl=D.products.length===0?'<div style="color:#bbb;text-align:center;padding:20px">Sin productos</div>':D.products.map(function(p,i){return '<div style="border-bottom:1px solid #f0f0f0;padding:10px 0"><div class="row"><strong>'+p.nm+'</strong><button class="btn btn-sm btn-gray" style="color:#c0392b;border-color:#fca5a5;width:auto;margin:0;padding:5px 10px" onclick="dpr('+i+')">X</button></div><div style="font-size:12px;margin-top:5px">Costo RD$'+p.co+' | +'+(p.ts-p.co)+' tuyo | +'+(p.tc-p.ts)+' vend | Cliente RD$'+p.tc+'</div></div>';}).join("");
  return '<div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:14px">Agregar producto</div><div class="field"><label class="lbl">Nombre</label><input value="'+(np.nm||"")+'" oninput="(S.np=S.np||{}).nm=this.value" placeholder="Ej: Carne molida comercial"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:'+(c&&ts&&tc?8:12)+'px"><div><label class="lbl">Costo/lb</label><input type="number" value="'+(np.co||"")+'" oninput="(S.np=S.np||{}).co=this.value;render()" placeholder="100"></div><div><label class="lbl">A vendedor</label><input type="number" value="'+(np.ts||"")+'" oninput="(S.np=S.np||{}).ts=this.value;render()" placeholder="102"></div><div><label class="lbl">Al cliente</label><input type="number" value="'+(np.tc||"")+'" oninput="(S.np=S.np||{}).tc=this.value;render()" placeholder="125"></div></div>'+prev+'<button class="btn btn-red" onclick="addpr()">+ Agregar</button></div><div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:12px">Lista de precios</div>'+pl+'</div>';
}

function addpr(){var f=S.np||{};var c=parseFloat(f.co)||0,ts=parseFloat(f.ts)||0,tc=parseFloat(f.tc)||0;if(!f.nm||!c||!ts||!tc){toast("Completa todos los campos");return;}if(ts<=c){toast("Precio vendedor debe ser mayor al costo");return;}if(tc<=ts){toast("Precio cliente debe ser mayor al del vendedor");return;}D.products.push({nm:f.nm,co:c,ts:ts,tc:tc});save("products",D.products).then(function(){S.np={};toast("Producto agregado");render();});}
function dpr(i){if(!confirm("Eliminar?"))return;D.products.splice(i,1);save("products",D.products).then(function(){render();});}

function aequipo(){
  var bS={};D.pedidos.forEach(function(p){if(!bS[p.sl])bS[p.sl]={n:0,t:0};bS[p.sl].n++;bS[p.sl].t+=p.am;});
  var rows=D.sellers.map(function(s,i){var d=bS[s.nm]||{n:0,t:0};return '<div style="border-bottom:1px solid #f0f0f0;padding:10px 0;display:flex;justify-content:space-between;align-items:center"><div><div style="font-weight:700;font-size:14px">'+s.nm+'</div><div style="font-size:12px;color:#888;margin-top:2px">'+d.n+' pedidos - '+fmt(d.t)+'</div></div><button class="btn btn-sm btn-gray" style="color:#c0392b;border-color:#fca5a5;width:auto;margin:0" onclick="dsl('+i+')">X</button></div>';}).join("")||'<div style="color:#bbb;text-align:center;padding:20px">Sin vendedores</div>';
  return '<div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:14px">Equipo de vendedores</div>'+rows+'</div><div style="background:#fff;border-radius:14px;padding:16px;border:2px dashed #ddd;text-align:center;font-size:13px;color:#888;line-height:1.8">Comparte la app<br>Vendedores PIN: 5678<br>Camion: 9012 - Secretaria: 3456</div>';
}

function dsl(i){if(!confirm("Eliminar a "+D.sellers[i].nm+"?"))return;D.sellers.splice(i,1);save("sellers",D.sellers).then(function(){render();});}

function vnuevo(){
  var s=D.sellers.find(function(x){return x.nm===S.sn;});
  if(!s)return vperfil();
  var vp=S.vp||{cl:"",ph:"",dt:td(),pt:"contado",dv:"camion",ds:"",lo:"",am:"",no:""};
  var po=D.products.map(function(p,i){return '<option value="'+i+'">'+p.nm+' - RD$'+p.tc+'/lb</option>';}).join("");
  var dd=vp.ds?'<div style="background:#f5f4f2;border-radius:10px;padding:10px 12px;font-size:14px;margin-bottom:12px;color:#444;display:flex;justify-content:space-between;align-items:center"><span>'+vp.ds+'</span><button class="btn btn-sm btn-gray" style="width:auto;margin:0;padding:4px 10px" onclick="S.vp.ds=\'\';render()">X</button></div>':"";
  return '<div style="text-align:center;margin-bottom:16px;font-size:14px;color:#666">Hola, <strong>'+s.nm+'</strong>!</div><div class="card"><div style="font-weight:700;font-size:16px;color:#c0392b;margin-bottom:14px">Nuevo pedido</div><div class="field"><label class="lbl">Cliente</label><input value="'+vp.cl+'" oninput="(S.vp=S.vp||{}).cl=this.value" placeholder="Nombre del cliente"></div><div class="field"><label class="lbl">Telefono</label><input type="tel" value="'+(vp.ph||"")+'" oninput="(S.vp=S.vp||{}).ph=this.value" placeholder="809-000-0000"></div><div class="g2"><div class="field"><label class="lbl">Fecha</label><input type="date" value="'+vp.dt+'" oninput="(S.vp=S.vp||{}).dt=this.value"></div><div class="field"><label class="lbl">Entrega</label><select onchange="(S.vp=S.vp||{}).dv=this.value"><option value="camion"'+(vp.dv==="camion"?" selected":"")+'>Camion</option><option value="motor"'+(vp.dv==="motor"?" selected":"")+'>Motor</option><option value="recoge"'+(vp.dv==="recoge"?" selected":"")+'>Recoge</option></select></div></div><div class="field"><label class="lbl">Pago</label><select onchange="(S.vp=S.vp||{}).pt=this.value"><option value="contado"'+(vp.pt==="contado"?" selected":"")+'>Contado</option><option value="c1"'+(vp.pt==="c1"?" selected":"")+'>Credito 1 semana</option><option value="c4"'+(vp.pt==="c4"?" selected":"")+'>Credito 1 mes</option></select></div><div class="field"><label class="lbl">Productos</label><select onchange="if(this.value!==\'\'){var p=D.products[this.value];(S.vp=S.vp||{}).ds=(S.vp&&S.vp.ds?S.vp.ds+\', \':\'\')+(p.nm+\' RD$\'+p.tc+\'/lb\');this.value=\'\';render()}"><option value="">Agregar producto...</option>'+po+'</select></div>'+dd+'<div class="g2"><div class="field"><label class="lbl">Libras</label><input type="number" value="'+(vp.qt||"")+'" oninput="(S.vp=S.vp||{}).qt=this.value" placeholder="0"></div><div class="field"><label class="lbl">Monto RD$</label><input type="number" value="'+vp.am+'" oninput="(S.vp=S.vp||{}).am=this.value" placeholder="0"></div></div><div class="field"><label class="lbl">Direccion</label><input value="'+vp.lo+'" oninput="(S.vp=S.vp||{}).lo=this.value" placeholder="Calle, numero, sector"></div><div class="field"><label class="lbl">Notas</label><input value="'+vp.no+'" oninput="(S.vp=S.vp||{}).no=this.value" placeholder="Indicacion especial..."></div><button class="btn btn-red" onclick="sp()">Enviar pedido al admin</button></div>';
}

function sp(){
  var f=S.vp||{};
  if(!f.cl||!f.am||!f.ds){toast("Completa cliente, productos y monto");return;}
  var id="p"+Date.now();
  D.pedidos.push({id:id,dt:f.dt||td(),sl:S.sn,cl:f.cl,ph:f.ph||"",ds:f.ds,lo:f.lo||"",dv:f.dv||"camion",pt:f.pt||"contado",am:parseFloat(f.am),qt:parseFloat(f.qt)||0,no:f.no||"",due:df(f.dt||td(),f.pt||"contado"),status:"pendiente",src:"v",ok:false,dp:"",pp:"",pm:"",pr:"",po:"",fi:"",fn:"",n2:""});
  save("pedidos",D.pedidos).then(function(){S.vp={};toast("Pedido enviado al admin");S.tab="mis";render();});
}

function vmis(){
  var mine=D.pedidos.filter(function(p){return p.sl===S.sn;}).slice().reverse();
  var sc=mine.filter(function(p){return p.fi&&p.status!=="cobrado";}).length;
  var cards=mine.map(function(p){
    var st=iv(p)?"vencido":p.status;var ss=SB[st]||{};
    var h='<div class="ocard'+(iv(p)?" venc":"")+'"><div class="row" style="margin-bottom:4px"><span style="font-weight:700;font-size:14px">'+p.cl+'</span><span style="font-weight:700">'+fmt(p.am)+'</span></div>';
    if(p.ph)h+='<div style="font-size:12px;color:#777;margin-bottom:2px">TEL '+p.ph+'</div>';
    h+='<div style="font-size:12px;color:#888;margin-bottom:3px">'+p.ds+' - '+p.dt+'</div>';
    if(p.lo)h+='<div style="font-size:12px;color:#777;margin-bottom:5px">DIR '+p.lo+'</div>';
    h+='<div class="row" style="margin-bottom:8px"><span class="pill" style="background:'+ss.bg+';color:'+ss.c+'">'+SN[st]+'</span><span style="font-size:11px;color:#aaa">'+DEI[p.dv||"camion"]+" "+PN[p.pt]+'</span></div>';
    h+=!p.ok?'<div style="font-size:12px;color:#BA7517;margin-bottom:8px">Pendiente de aprobacion</div>':'<div style="font-size:12px;color:#1D9E75;margin-bottom:8px">Aprobado</div>';
    h+=wf(p,false);
    if(p.fi&&p.status!=="cobrado")h+='<button class="btn btn-green" style="margin-top:10px" onclick="S.modal={type:\'CO\',id:\''+p.id+'\'};render()">Registrar cobro</button>';
    if(p.status==="cobrado")h+='<div class="cobadge" style="margin-top:8px">Cobrado '+(p.pm==="efe"?"Efectivo":"Transferencia")+'</div>';
    return h+'</div>';
  }).join("");
  return (sc>0?'<div class="abox">'+sc+' pedido'+(sc>1?"s":"")+" con factura lista para cobrar</div>":"")+'<div style="font-weight:700;font-size:15px;margin-bottom:12px">Mis pedidos</div>'+(mine.length===0?'<div style="text-align:center;color:#bbb;padding:50px 0;font-size:14px">No has enviado pedidos</div>':cards);
}

function vperfil(){
  var s=D.sellers.find(function(x){return x.nm===S.sn;});
  return '<div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:14px">Mi perfil</div>'+(s?'<div style="text-align:center;padding:16px 0"><div style="font-size:50px;margin-bottom:10px">VND</div><div style="font-size:18px;font-weight:700">'+s.nm+'</div><div style="font-size:13px;color:#888;margin-top:6px">Vendedor - Pikascarne</div></div>':'<p style="font-size:14px;color:#666;margin-bottom:16px">Como te llamas?</p><div class="field"><input id="snin" placeholder="Tu nombre completo"></div><button class="btn btn-red" onclick="ssel()">Continuar</button>')+'</div>';
}

function ssel(){var v=document.getElementById("snin")&&document.getElementById("snin").value.trim();if(!v){toast("Escribe tu nombre");return;}S.sn=v;if(!D.sellers.find(function(x){return x.nm===v;})){D.sellers.push({nm:v});save("sellers",D.sellers);}S.tab="nuevo";render();}

function cruta(){
  var ruta=D.pedidos.filter(function(p){return (p.dv==="camion"||p.dv==="motor")&&p.ok&&p.status!=="cobrado"&&p.status!=="entregado";}).slice().reverse();
  if(!ruta.length)return '<div style="text-align:center;color:#bbb;padding:60px 0"><div style="font-size:50px;margin-bottom:12px">OK</div><div style="font-size:14px">Sin entregas pendientes</div></div>';
  var cards=ruta.map(function(p){
    var wamsg=encodeURIComponent("Hola "+p.cl+", soy el delivery de Pikascarne. Estoy saliendo hacia tu direccion ahora mismo!");
    var h='<div class="ocard"><div class="row" style="margin-bottom:4px"><span style="font-weight:700;font-size:15px">'+p.cl+'</span><span style="font-weight:700">'+fmt(p.am)+'</span></div>';
    if(p.ph)h+='<div style="font-size:13px;color:#555;margin-bottom:3px">TEL '+p.ph+'</div>';
    if(p.lo)h+='<div style="font-size:13px;color:#555;margin-bottom:6px">DIR '+p.lo+'</div>';
    h+='<div style="font-size:13px;color:#888;margin-bottom:10px">'+p.ds+'</div>';
    h+=wf(p,false);
    if(p.ph)h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;margin-bottom:8px"><a href="https://wa.me/'+p.ph.replace(/[^0-9]/g,"")+p.ph.replace(/[^0-9]/g,"").length+"&text="+wamsg+'" target="_blank" class="btn btn-wa btn-sm" style="text-align:center;text-decoration:none">WhatsApp</a><a href="tel:'+p.ph+'" class="btn btn-blue btn-sm" style="text-align:center;text-decoration:none">Llamar</a></div>';
    h+='<button class="btn btn-green" onclick="S.modal={type:\'EN\',id:\''+p.id+'\'};render()">Confirmar entrega y pago</button></div>';
    return h;
  }).join("");
  return '<div style="font-weight:700;font-size:15px;margin-bottom:12px">'+ruta.length+' entrega'+(ruta.length>1?"s":"")+" pendientes</div>"+cards;
}

function cents(){
  var done=D.pedidos.filter(function(p){return p.status==="entregado"||p.status==="cobrado";}).slice().reverse();
  var cards=done.map(function(p){var h='<div class="ocard"><div class="row"><strong>'+p.cl+'</strong><span class="pill" style="background:#E1F5EE;color:#085041">Entregado</span></div><div style="font-size:12px;color:#888;margin-top:5px">'+fmt(p.am)+' - '+(p.pm==="efe"?"Efectivo":p.pm==="tra"?"Transferencia":"Pendiente")+'</div>';if(p.pr)h+='<div style="font-size:12px;color:#666;margin-top:3px">Ref: '+p.pr+'</div>';if(p.po)h+='<img src="'+p.po+'" class="fthumb" onclick="window.open(this.src)">';return h+'</div>';}).join("");
  return '<div style="font-weight:700;font-size:15px;margin-bottom:12px">'+done.length+' entregas</div>'+(done.length===0?'<div style="text-align:center;color:#bbb;padding:50px 0">Sin entregas</div>':cards);
}

function sfacts(){
  var f=S.sff||"pendiente";
  var sinF=D.pedidos.filter(function(p){return p.ok&&!p.fi&&p.status!=="cobrado";});
  var conF=D.pedidos.filter(function(p){return p.fi;});
  var list=f==="pendiente"?sinF:conF;
  var cards=list.map(function(p){var st=iv(p)?"vencido":p.status;var ss=SB[st]||{};var h='<div class="ocard"><div class="row" style="margin-bottom:4px"><span style="font-weight:700;font-size:14px">'+DEI[p.dv||"camion"]+" "+p.cl+'</span><span style="font-weight:700">'+fmt(p.am)+'</span></div><div style="font-size:12px;color:#888;margin-bottom:3px">'+p.sl+' - '+p.dt+'</div><div style="font-size:13px;color:#555;margin-bottom:5px">'+p.ds+'</div>';if(p.lo)h+='<div style="font-size:12px;color:#777;margin-bottom:5px">DIR '+p.lo+'</div>';h+='<div class="row" style="margin-bottom:10px"><span class="pill" style="background:'+ss.bg+';color:'+ss.c+'">'+SN[st]+'</span><span style="font-size:11px;color:#aaa">'+PN[p.pt]+'</span></div>'+wf(p,true)+'</div>';return h;}).join("");
  return '<div class="g2"><div class="metric"><div class="ml">Sin factura</div><div class="mv" style="color:#c0392b">'+sinF.length+'</div></div><div class="metric"><div class="ml">Facturados</div><div class="mv" style="color:#1D9E75">'+conF.length+'</div></div></div>'+(sinF.length>0?'<div class="abox">'+sinF.length+' pedido'+(sinF.length>1?"s":"")+" pendiente"+(sinF.length>1?"s":"")+" de factura</div>":"")+'<div style="display:flex;gap:8px;margin-bottom:12px"><button class="btn btn-sm '+(f==="pendiente"?"btn-red":"btn-gray")+'" onclick="S.sff=\'pendiente\';render()">Pendientes</button><button class="btn btn-sm '+(f==="facturados"?"btn-red":"btn-gray")+'" onclick="S.sff=\'facturados\';render()">Facturados</button></div>'+(list.length===0?'<div style="text-align:center;color:#bbb;padding:50px 0">'+(f==="pendiente"?"Todo facturado":"Sin facturas")+'</div>':cards);
}

function spagos(){
  var wp=D.pedidos.filter(function(p){return p.pm;});
  var tc=wp.filter(function(p){return p.status==="cobrado";}).reduce(function(a,p){return a+p.am;},0);
  var cards=wp.map(function(p){var h='<div class="ocard"><div class="row"><strong>'+p.cl+'</strong><strong>'+fmt(p.am)+'</strong></div><div style="font-size:12px;color:#888;margin-top:3px">'+p.sl+' - '+p.dt+'</div><div style="margin-top:8px"><span class="pill" style="background:'+(p.pm==="efe"?"#E1F5EE":"#EEEDFE")+';color:'+(p.pm==="efe"?"#085041":"#3C3489")+'">'+(p.pm==="efe"?"Efectivo":p.pm==="tra"?"Transferencia":"Pendiente")+'</span>'+(p.pr?'<span style="font-size:12px;color:#666;margin-left:8px">Ref: '+p.pr+'</span>':"")+'</div>';if(p.po)h+='<img src="'+p.po+'" class="fthumb" onclick="window.open(this.src)">';h+=wf(p,true)+'</div>';return h;}).join("");
  return '<div class="g2"><div class="metric"><div class="ml">Total cobrado</div><div class="mv" style="color:#1D9E75">'+fmt(tc)+'</div></div><div class="metric"><div class="ml">Comprobantes</div><div class="mv">'+wp.length+'</div></div></div>'+(wp.length===0?'<div style="text-align:center;color:#bbb;padding:50px 0">Sin comprobantes</div>':cards);
}

function modal(){
  var m=S.modal;if(!m)return "";
  var body="";
  if(m.type==="F"){
    var p=D.pedidos.find(function(x){return x.id===m.id;})||{};
    body='<div class="sh"></div><div style="font-weight:700;font-size:17px;margin-bottom:5px">Subir factura</div><div style="font-size:13px;color:#888;margin-bottom:16px">'+p.cl+' - '+fmt(p.am)+'</div><div class="field"><label class="lbl">Foto de la factura</label><input type="file" accept="image/*,application/pdf" capture="environment" id="fi" onchange="hf(this)" style="font-size:14px;padding:10px">'+(m.fi?'<img src="'+m.fi+'" class="fthumb">':'')+'</div><div class="field"><label class="lbl">Nota (opcional)</label><input value="'+(m.fn||"")+'" oninput="S.modal.fn=this.value" placeholder="Factura #0045"></div><div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-gray" style="flex:1" onclick="S.modal=null;render()">Cancelar</button><button class="btn btn-red" style="flex:2" onclick="svf()">Guardar factura</button></div>';
  } else if(m.type==="CO"||m.type==="EN"){
    var p=D.pedidos.find(function(x){return x.id===m.id;})||{};var pm=m.pm||"";
    body='<div class="sh"></div><div style="font-weight:700;font-size:17px;margin-bottom:5px">'+(m.type==="CO"?"Registrar cobro":"Confirmar entrega")+'</div><div style="font-size:13px;color:#888;margin-bottom:14px">'+p.cl+' - '+fmt(p.am)+'</div>'+(p.fi?'<div style="margin-bottom:14px"><div style="font-size:11px;font-weight:700;color:#666;margin-bottom:5px">Factura del pedido:</div><img src="'+p.fi+'" class="fthumb"></div>':"")+'<div class="field"><label class="lbl">Forma de pago</label><div style="display:flex;flex-wrap:wrap;margin-top:4px"><button class="pchip'+(pm==="efe"?" efe":"")+'" onclick="S.modal.pm=\'efe\';render()">Efectivo</button><button class="pchip'+(pm==="tra"?" tra":"")+'" onclick="S.modal.pm=\'tra\';render()">Transferencia</button><button class="pchip'+(pm==="pen"?" pen":"")+'" onclick="S.modal.pm=\'pen\';render()">Pendiente</button></div></div>'+(pm==="tra"?'<div class="field"><label class="lbl">Referencia</label><input value="'+(m.pr||"")+'" oninput="S.modal.pr=this.value" placeholder="Numero de referencia" type="number"></div>':"")+'<div class="field"><label class="lbl">Foto del comprobante (opcional)</label><input type="file" accept="image/*" capture="environment" id="pi" onchange="hp(this)" style="font-size:14px;padding:10px">'+(m.po?'<img src="'+m.po+'" class="fthumb">':'')+'</div><div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-gray" style="flex:1" onclick="S.modal=null;render()">Cancelar</button><button class="btn btn-green" style="flex:2" onclick="cpg()">'+(m.type==="CO"?"Confirmar cobro":"Confirmar entrega")+'</button></div>';
  } else if(m.type==="E"){
    var p=D.pedidos.find(function(x){return x.id===m.id;})||{};
    body='<div class="sh"></div><div style="font-weight:700;font-size:17px;margin-bottom:14px">Editar - '+p.cl+'</div><div class="field"><label class="lbl">Estado</label><select onchange="S.modal.status=this.value"><option value="pendiente"'+((m.status||p.status)==="pendiente"?" selected":"")+'>Pendiente</option><option value="despachado"'+((m.status||p.status)==="despachado"?" selected":"")+'>Despachado</option><option value="entregado"'+((m.status||p.status)==="entregado"?" selected":"")+'>Entregado</option><option value="cobrado"'+((m.status||p.status)==="cobrado"?" selected":"")+'>Cobrado</option><option value="credito"'+((m.status||p.status)==="credito"?" selected":"")+'>Credito</option></select></div><div class="field"><label class="lbl">Direccion</label><input value="'+(m.lo!==undefined?m.lo:(p.lo||""))+'" oninput="S.modal.lo=this.value"></div><div style="display:flex;gap:8px;margin-top:4px"><button class="btn btn-gray" style="flex:1" onclick="S.modal=null;render()">Cancelar</button><button class="btn btn-red" style="flex:2" onclick="ae()">Guardar</button></div>';
  } else if(m.type==="SH"){
    var sf=m.sf||"pendiente";
    var list;
    if(sf==="pendiente")list=D.pedidos.filter(function(p){return p.status==="pendiente"&&p.ok;});
    else if(sf==="todos")list=D.pedidos.filter(function(p){return p.status!=="cobrado"&&p.ok;});
    else list=D.pedidos.filter(function(p){return p.ok;});
    var total=list.reduce(function(a,p){return a+p.am;},0);
    body='<div class="sh"></div><div style="font-weight:700;font-size:17px;margin-bottom:12px">Enviar al socio</div><div class="field"><label class="lbl">Incluir</label><select onchange="S.modal.sf=this.value;render()"><option value="pendiente"'+(sf==="pendiente"?" selected":"")+'>Pendientes aprobados</option><option value="todos"'+(sf==="todos"?" selected":"")+'>Todos activos</option><option value="todo"'+(sf==="todo"?" selected":"")+'>Todos</option></select></div><div class="field"><label class="lbl">Mensaje</label><input value="'+(m.msg||"")+'" oninput="S.modal.msg=this.value" placeholder="Ej: Pedidos del lunes"></div><div style="background:#fef2f2;border-radius:10px;padding:11px;font-size:14px;color:#c0392b;margin-bottom:14px">'+list.length+' pedidos - '+fmt(total)+'</div><button class="btn btn-red" onclick="ds()">Copiar para WhatsApp</button><button class="btn btn-gray" onclick="S.modal=null;render()">Cancelar</button>';
  }
  return '<div class="overlay" onclick="if(event.target===this){S.modal=null;render()}"><div class="sheet">'+body+'</div></div>';
}

function hf(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){S.modal.fi=e.target.result;render();};r.readAsDataURL(f);}
function hp(inp){var f=inp.files[0];if(!f)return;var r=new FileReader();r.onload=function(e){S.modal.po=e.target.result;render();};r.readAsDataURL(f);}

function svf(){var m=S.modal;if(!m.fi){toast("Selecciona una imagen");return;}var i=D.pedidos.findIndex(function(p){return p.id===m.id;});if(i<0)return;D.pedidos[i].fi=m.fi;D.pedidos[i].fn=m.fn||"";save("pedidos",D.pedidos).then(function(){S.modal=null;toast("Factura guardada - visible para todos");render();});}

function cpg(){var m=S.modal;if(!m.pm){toast("Selecciona forma de pago");return;}var i=D.pedidos.findIndex(function(p){return p.id===m.id;});if(i<0)return;D.pedidos[i].status=m.pm==="pen"?"entregado":"cobrado";D.pedidos[i].pm=m.pm;D.pedidos[i].pr=m.pr||"";D.pedidos[i].po=m.po||"";save("pedidos",D.pedidos).then(function(){S.modal=null;toast("Registrado correctamente");render();});}

function ae(){var m=S.modal;var i=D.pedidos.findIndex(function(p){return p.id===m.id;});if(i<0)return;var p=D.pedidos[i];D.pedidos[i]=Object.assign({},p,{status:m.status||p.status,lo:m.lo!==undefined?m.lo:p.lo});save("pedidos",D.pedidos).then(function(){S.modal=null;toast("Actualizado");render();});}

function ds(){
  var m=S.modal;var sf=m.sf||"pendiente";
  var list;
  if(sf==="pendiente")list=D.pedidos.filter(function(p){return p.status==="pendiente"&&p.ok;});
  else if(sf==="todos")list=D.pedidos.filter(function(p){return p.status!=="cobrado"&&p.ok;});
  else list=D.pedidos.filter(function(p){return p.ok;});
  var date=new Date().toLocaleDateString("es-DO");
  var txt="PIKASCARNE DOMINICANA\nPEDIDOS PARA DESPACHO\n"+date+"\n";
  if(m.msg)txt+="Nota: "+m.msg+"\n";
  txt+="---\n";
  var byD={camion:[],motor:[],recoge:[]};
  list.forEach(function(p){var d=p.dv||"camion";if(!byD[d])byD[d]=[];byD[d].push(p);});
  var n=1;
  ["camion","motor","recoge"].forEach(function(d){
    if(!byD[d].length)return;
    txt+="\n"+DE[d].toUpperCase()+"\n";
    byD[d].forEach(function(p){
      txt+=n+++". "+p.cl;
      if(p.lo)txt+="\n   "+p.lo;
      if(p.ph)txt+="\n   "+p.ph;
      txt+="\n   "+p.ds+"\n   "+fmt(p.am)+" - "+PN[p.pt]+"\n";
    });
  });
  txt+="\n---\nTOTAL: "+fmt(list.reduce(function(a,p){return a+p.am;},0))+" - "+list.length+" pedidos";
  navigator.clipboard.writeText(txt).then(function(){toast("Copiado - pegalo en WhatsApp");S.modal=null;render();}).catch(function(){toast("Error al copiar");});
}
