const dueFn=(date,type)=>{const d=new Date(date);if(type==="credito1")d.setDate(d.getDate()+7);else if(type==="credito4")d.setDate(d.getDate()+28);else return null;return d.toISOString().split("T")[0]};

const DN={camion:"Camión",motor:"Motor",recoge:"Recoge"};
const PN={contado:"Contado",credito1:"Crédito 1 sem.",credito4:"Crédito 1 mes"};
const SN={pendiente:"Pendiente",despachado:"Despachado",credito:"Crédito",cobrado:"Cobrado",entregado:"Entregado"};
const SS={pendiente:{bg:"#FAEEDA",c:"#633806"},despachado:{bg:"#EEEDFE",c:"#3C3489"},cobrado:{bg:"#E1F5EE",c:"#085041"},credito:{bg:"#fef2f2",c:"#991b1b"},entregado:{bg:"#dbeafe",c:"#1e40af"},vencido:{bg:RED,c:"#fff"}};
const ROLES={admin:{label:"Supervisor",icon:"👑",pin:"1234"},vendedor:{label:"Vendedor",icon:"🧑‍💼",pin:"5678"},camion:{label:"Camión / Delivery",icon:"🚛",pin:"9012"},socio:{label:"Secretaria / Socio",icon:"🤝",pin:"3456"}};

let APP={role:null,sellerName:"",tab:"",modal:null,pinInput:"",selRole:null,_apf:"nuevos",_sfF:"pendiente",_np:{},_vp:{}};
let DATA={sellers:[],products:[],pedidos:[]};
let _listener=null;

const $ = id => document.getElementById(id);
function showToast(msg,d=2600){const t=$("toast");t.textContent=msg;t.style.opacity=1;setTimeout(()=>t.style.opacity=0,d);}
function ref(p){return DB.ref("pk/"+p);}

function startSync(){
  if(_listener){DB.ref("pk").off("value",_listener);_listener=null;}
  _listener=DB.ref("pk").on("value",snap=>{
    const d=snap.val()||{};
    DATA.sellers=d.sellers?Object.values(d.sellers):[];
    DATA.products=d.products?Object.values(d.products):[];
    DATA.pedidos=d.pedidos?Object.values(d.pedidos):[];
    render();
    const l=$("app-loading");if(l)l.style.display="none";
  });
}

function stopSync(){if(_listener){DB.ref("pk").off("value",_listener);_listener=null;}}

async function fbSave(path,arr){
  const obj=arr.reduce((o,v,i)=>{o[i]=v;return o},{});
  await DB.ref("pk/"+path).set(obj);
}

function render(){
  $("root").innerHTML=!APP.role?buildLogin():buildApp();
  if(APP.modal)$("root").insertAdjacentHTML("beforeend",buildModal());
}

  const r=APP.selRole;
  return `<div class="login-wrap">
  <div class="lcard">
    <div style="text-align:center;margin-bottom:20px">
      <img src="${LOGO}" style="height:72px;object-fit:contain;margin-bottom:8px;border-radius:8px" alt="Pikascarne">

    </div>

    <div class="rgrid">
      ${Object.entries(ROLES).map(([k,v])=>`<div class="rbtn${APP.selRole===k?" on":""}" onclick="APP.selRole='${k}';APP.pinInput='';render()">
        <div class="ri">${v.icon}</div><div class="rn">${v.label}</div>
      </div>`).join("")}
    </div>
    ${r?`<p style="text-align:center;font-size:12px;color:#888;margin-bottom:2px;font-weight:600">Ingresa tu PIN</p>
    <div class="pin-row">${[0,1,2,3].map(i=>`<div class="pdot${APP.pinInput.length>i?" on":""}"></div>`).join("")}</div>
    ${APP.pinInput.length===4&&APP.pinInput!==ROLES[r].pin?`<p style="text-align:center;font-size:12px;color:${RED};margin-bottom:10px">PIN incorrecto</p>`:""}
    <div class="numpad">${[1,2,3,4,5,6,7,8,9,"",0,"⌫"].map(k=>`<button class="nk${k==="⌫"?" del":""}" onclick="pinPress('${k}')">${k}</button>`).join("")}</div>`
    :`<p style="text-align:center;font-size:12px;color:#bbb;margin-top:10px">Selecciona tu rol arriba</p>`}
  </div>
  <p style="color:rgba(255,255,255,.35);font-size:11px;margin-top:16px">Pikascarne Dominicana S.R.L.</p>
</div>`;
}

function pinPress(k){
  if(k==="⌫"){APP.pinInput=APP.pinInput.slice(0,-1);render();return;}
  if(k===""||APP.pinInput.length>=4)return;
  APP.pinInput+=k;
  if(APP.pinInput.length===4){
    const r=APP.selRole;
    if(APP.pinInput===ROLES[r].pin){
      APP.role=r;APP.pinInput="";APP.selRole=null;
      if(r==="vendedor"){APP.tab=APP.sellerName?"nuevo":"perfil";}
      else if(r==="camion")APP.tab="ruta";
      else if(r==="socio")APP.tab="facturas";
      else APP.tab="pedidos";
      startSync();return;
    }render();return;
  }render();
}

// ── APP SHELL ──
function buildApp(){
  const ri=ROLES[APP.role];
  const tabs=getTabs();
  const nuevos=DATA.pedidos.filter(p=>!p.adminApproved&&p.source==="vendedor").length;
  const sinF=DATA.pedidos.filter(p=>p.adminApproved&&!p.facturaImg&&p.status!=="cobrado").length;
  return `
  <div class="topbar">
    <img src="${LOGO}" alt="Pikascarne">
    <div class="title">Pikascarne<span class="sdot"></span></div>
    <span class="rbadge">${ri.icon} ${ri.label}</span>
    <button onclick="APP.role=null;APP.sellerName='';stopSync();render()" style="background:rgba(255,255,255,.2);border:none;color:#fff;border-radius:8px;padding:6px 10px;font-size:11px;cursor:pointer;font-family:inherit">Salir</button>
  </div>
  <div class="tabs">
    ${tabs.map(t=>`<button class="tab${APP.tab===t.id?" active":""}" onclick="APP.tab='${t.id}';render()">${t.icon} ${t.label}${t.id==="pedidos"&&APP.role==="admin"&&nuevos>0?` <span style="background:${RED};color:#fff;border-radius:10px;font-size:9px;padding:1px 5px">${nuevos}</span>`:""}${t.id==="facturas"&&APP.role==="socio"&&sinF>0?` <span style="background:${RED};color:#fff;border-radius:10px;font-size:9px;padding:1px 5px">${sinF}</span>`:""}</button>`).join("")}
  </div>
  <div class="page">${buildPage()}</div>`;
}

function getTabs(){
  if(APP.role==="admin")return[{id:"pedidos",icon:"📋",label:"Pedidos"},{id:"cuadre",icon:"📊",label:"Cuadre"},{id:"productos",icon:"📦",label:"Productos"},{id:"equipo",icon:"👥",label:"Equipo"}];
  if(APP.role==="vendedor")return[{id:"nuevo",icon:"➕",label:"Nuevo"},{id:"mis",icon:"📋",label:"Mis pedidos"},{id:"perfil",icon:"👤",label:"Perfil"}];
  if(APP.role==="camion")return[{id:"ruta",icon:"🚛",label:"Mi ruta"},{id:"entregados",icon:"✅",label:"Entregados"}];
  if(APP.role==="socio")return[{id:"facturas",icon:"🧾",label:"Facturas"},{id:"pagos",icon:"💳",label:"Pagos"}];
  return[];
}

function buildPage(){
  if(APP.role==="admin"){if(APP.tab==="pedidos")return pgAdminPed();if(APP.tab==="cuadre")return pgCuadre();if(APP.tab==="productos")return pgProductos();if(APP.tab==="equipo")return pgEquipo();}
  if(APP.role==="vendedor"){if(APP.tab==="nuevo")return pgVendNuevo();if(APP.tab==="mis")return pgVendMis();if(APP.tab==="perfil")return pgVendPerfil();}
  if(APP.role==="camion"){if(APP.tab==="ruta")return pgRuta();if(APP.tab==="entregados")return pgEntregados();}
  if(APP.role==="socio"){if(APP.tab==="facturas")return pgFacturas();if(APP.tab==="pagos")return pgPagos();}
  return"";
}

  if(!p)return"";
  if(p.facturaImg)return`<div style="margin-top:10px"><div style="font-size:11px;font-weight:700;color:#666;margin-bottom:4px">🧾 Factura</div>
    <img src="${p.facturaImg}" class="fthumb" onclick="window.open(this.src)">
    ${p.facturaNote?`<div style="font-size:11px;color:#888;margin-top:5px">📝 ${p.facturaNote}</div>`:""}
    ${canUp?`<button class="btn btn-sm btn-gray" style="margin-top:8px" onclick="APP.modal={type:'factura',id:'${p.id}'};render()">🔄 Cambiar</button>`:""}</div>`;
  if(canUp)return`<div class="fbox" onclick="APP.modal={type:'factura',id:'${p.id}'};render()"><div style="font-size:26px">🧾</div><div style="font-size:13px;color:#888;margin-top:6px;font-weight:500">Toca para subir factura</div></div>`;
  return`<div style="margin-top:6px;font-size:12px;color:#bbb;font-style:italic">⏳ Factura pendiente de la secretaria</div>`;
}

      <div class="row" style="margin-bottom:10px">

async function approvePed(id){const i=DATA.pedidos.findIndex(p=>p.id===id);if(i<0)return;DATA.pedidos[i].adminApproved=true;await fbSave("pedidos",DATA.pedidos);showToast("Aprobado ✓");}

// ── CUADRE ──
function pgCuadre(){
  const bS={};DATA.pedidos.forEach(p=>{if(!bS[p.seller])bS[p.seller]={count:0,total:0,cobrado:0};bS[p.seller].count++;bS[p.seller].total+=p.amount;if(p.status==="cobrado")bS[p.seller].cobrado+=p.amount;});
  const tot=DATA.pedidos.reduce((a,p)=>a+p.amount,0);
  const cob=DATA.pedidos.filter(p=>p.status==="cobrado").reduce((a,p)=>a+p.amount,0);
  return`<div class="g2">
    <div class="metric"><div class="ml">Total pedidos</div><div class="mv">${fmt(tot)}</div></div>
    <div class="metric"><div class="ml">Cobrado</div><div class="mv" style="color:${TEAL}">${fmt(cob)}</div></div>
  </div>
  <button class="btn btn-outline" style="margin-bottom:12px" onclick="copyCuadre()">📋 Copiar resumen WhatsApp</button>
  <div class="card"><div style="font-weight:700;font-size:15px;margin-bottom:12px">Por vendedor</div>
    ${Object.entries(bS).map(([n,d])=>`<div style="border-bottom:1px solid #f0f0f0;padding:10px 0">

}

  const bS={};DATA.pedidos.forEach(p=>{if(!bS[p.seller])bS[p.seller]={count:0,total:0};bS[p.seller].count++;bS[p.seller].total+=p.amount;});

    <div class="field"><label class="lbl">Forma de pago</label>
      <div style="display:flex;flex-wrap:wrap;margin-top:4px">
        <button class="pchip${pm==="efectivo"?" efe":""}" onclick="APP.modal.payMode='efectivo';render()">💵 Efectivo</button>
        <button class="pchip${pm==="transferencia"?" tra":""}" onclick="APP.modal.payMode='transferencia';render()">💳 Transferencia</button>
        <button class="pchip${pm==="pendiente"?" pen":""}" onclick="APP.modal.payMode='pendiente';render()">⏳ Pendiente</button>
      </div>
    </div>
    ${pm==="transferencia"?`<div class="field"><label class="lbl">Número de referencia</label><input value="${m.payRef||""}" oninput="APP.modal.payRef=this.value" placeholder="Número de referencia" type="number"></div>`:""}
    <div class="field"><label class="lbl">📷 Foto del comprobante (opcional)</label>
      <input type="file" accept="image/*" capture="environment" id="pinp" onchange="handlePay(this)" style="font-size:14px;padding:10px">
      ${m.payPhoto?`<img src="${m.payPhoto}" class="fthumb">`:""}
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-gray" style="flex:1" onclick="APP.modal=null;render()">Cancelar</button>
      <button class="btn btn-green" style="flex:2" onclick="confirmPago()">✅ ${m.type==="cobro"?"Confirmar cobro":"Confirmar entrega"}</button>
    </div>`;
  } else if(m.type==="editped"){
    const p=DATA.pedidos.find(x=>x.id===m.id)||{};
    body=`<div class="sh"></div>
    <div style="font-weight:700;font-size:17px;margin-bottom:14px">✏️ Editar — ${p.client}</div>
    <div class="field"><label class="lbl">Estado</label><select onchange="APP.modal.status=this.value">
      ${["pendiente","despachado","entregado","cobrado","credito"].map(s=>`<option value="${s}"${(m.status||p.status)===s?" selected":""}>${SN[s]||s}</option>`).join("")}
    </select></div>
    <div class="field"><label class="lbl">Tipo de entrega</label><select onchange="APP.modal.delivery=this.value">
      ${["camion","motor","recoge"].map(d=>`<option value="${d}"${(m.delivery||p.delivery||"camion")===d?" selected":""}>${DE[d]} ${DN[d]}</option>`).join("")}
    </select></div>
    <div class="field"><label class="lbl">📍 Dirección</label><input value="${m.location!==undefined?m.location:(p.location||"")}" oninput="APP.modal.location=this.value"></div>
    <div class="g2">
      <div class="field"><label class="lbl">Fecha despacho</label><input type="date" value="${m.dispatchDate||p.dispatchDate||""}" oninput="APP.modal.dispatchDate=this.value"></div>
      <div class="field"><label class="lbl">Fecha pago</label><input type="date" value="${m.paidDate||p.paidDate||""}" oninput="APP.modal.paidDate=this.value"></div>
    </div>
    <div class="field"><label class="lbl">Notas</label><input value="${m.notes2!==undefined?m.notes2:(p.notes2||"")}" oninput="APP.modal.notes2=this.value"></div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-gray" style="flex:1" onclick="APP.modal=null;render()">Cancelar</button>
      <button class="btn btn-red" style="flex:2" onclick="applyEdit()">✓ Guardar</button>
    </div>`;
  } else if(m.type==="share"){
    const sf=m.sf||"pendiente";
    const td=todayStr();const wAgo=new Date(Date.now()-7*86400000).toISOString().split("T")[0];
    let list;if(sf==="pendiente")list=DATA.pedidos.filter(p=>p.status==="pendiente"&&p.adminApproved);else if(sf==="todos")list=DATA.pedidos.filter(p=>p.status!=="cobrado"&&p.adminApproved);else if(sf==="hoy")list=DATA.pedidos.filter(p=>p.date===td);else if(sf==="semana")list=DATA.pedidos.filter(p=>p.date>=wAgo);else list=DATA.pedidos.filter(p=>p.adminApproved);
    body=`<div class="sh"></div>
    <div style="font-weight:700;font-size:17px;margin-bottom:12px">📤 Enviar al socio</div>
    <div class="field"><label class="lbl">Incluir</label><select onchange="APP.modal.sf=this.value;render()">
      ${["pendiente","todos","hoy","semana","absoluto"].map(f=>`<option value="${f}"${sf===f?" selected=""":""}">${{pendiente:"Pendientes aprobados",todos:"Todos activos",hoy:"Solo de hoy",semana:"Esta semana",absoluto:"Todos"}[f]}</option>`).join("")}
    </select></div>
    <div class="field"><label class="lbl">Mensaje para el socio</label><input value="${m.msg||""}" oninput="APP.modal.msg=this.value" placeholder="Ej: Pedidos del lunes"></div>
    <div style="background:#fef2f2;border-radius:10px;padding:11px 13px;font-size:14px;color:${RED};margin-bottom:14px">
      📋 <strong>${list.length}</strong> pedido${list.length!==1?"s":""} · ${fmt(list.reduce((a,p)=>a+p.amount,0))}
    </div>
    <button class="btn btn-red" onclick="doShare()">📋 Copiar para WhatsApp</button>
    <button class="btn btn-gray" onclick="APP.modal=null;render()">Cancelar</button>`;
  }
  return`<div class="overlay" onclick="if(event.target===this){APP.modal=null;render()}"><div class="sheet">${body}</div></div>`;
}

function handleFact(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{APP.modal.facturaImg=e.target.result;render();};r.readAsDataURL(f);}
function handlePay(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{APP.modal.payPhoto=e.target.result;render();};r.readAsDataURL(f);}

async function saveFact(){const m=APP.modal;if(!m.facturaImg){showToast("Selecciona una imagen primero");return;}const i=DATA.pedidos.findIndex(p=>p.id===m.id);if(i<0)return;DATA.pedidos[i].facturaImg=m.facturaImg;DATA.pedidos[i].facturaNote=m.facturaNote||"";await fbSave("pedidos",DATA.pedidos);APP.modal=null;showToast("✅ Factura guardada — visible para todos");render();}

async function confirmPago(){const m=APP.modal;if(!m.payMode){showToast("Selecciona forma de pago");return;}const i=DATA.pedidos.findIndex(p=>p.id===m.id);if(i<0)return;DATA.pedidos[i].status=m.payMode==="pendiente"?"entregado":"cobrado";DATA.pedidos[i].payMode=m.payMode;DATA.pedidos[i].payRef=m.payRef||"";DATA.pedidos[i].payPhoto=m.payPhoto||"";await fbSave("pedidos",DATA.pedidos);APP.modal=null;showToast("✅ Registrado correctamente");render();}

async function applyEdit(){const m=APP.modal;const i=DATA.pedidos.findIndex(p=>p.id===m.id);if(i<0)return;const p=DATA.pedidos[i];DATA.pedidos[i]={...p,status:m.status||p.status,delivery:m.delivery||p.delivery,location:m.location!==undefined?m.location:p.location,dispatchDate:m.dispatchDate||p.dispatchDate,paidDate:m.paidDate||p.paidDate,notes2:m.notes2!==undefined?m.notes2:p.notes2};await fbSave("pedidos",DATA.pedidos);APP.modal=null;showToast("Actualizado ✓");render();}

function doShare(){
  const m=APP.modal;const sf=m.sf||"pendiente";const td=todayStr();const wAgo=new Date(Date.now()-7*86400000).toISOString().split("T")[0];
  let list;if(sf==="pendiente")list=DATA.pedidos.filter(p=>p.status==="pendiente"&&p.adminApproved);else if(sf==="todos")list=DATA.pedidos.filter(p=>p.status!=="cobrado"&&p.adminApproved);else if(sf==="hoy")list=DATA.pedidos.filter(p=>p.date===td);else if(sf==="semana")list=DATA.pedidos.filter(p=>p.date>=wAgo);else list=DATA.pedidos.filter(p=>p.adminApproved);
  const date=new Date().toLocaleDateString("es-DO",{weekday:"long",year:"numeric",month:"long",day:"numeric"});
  let txt="🥩 *PIKASCARNE DOMINICANA*\n📦 PEDIDOS PARA DESPACHO\n📅 "+date+"\n";
  if(m.msg)txt+="💬 "+m.msg+"\n";txt+="─".repeat(28)+"\n";
  const byD={camion:[],motor:[],recoge:[]};list.forEach(p=>{const d=p.delivery||"camion";if(!byD[d])byD[d]=[];byD[d].push(p);});
  let n=1;["camion","motor","recoge"].forEach(d=>{if(!byD[d].length)return;txt+="\n"+DE[d]+" *"+DN[d].toUpperCase()+"*\n";byD[d].forEach(p=>{txt+=n+++". *"+p.client+"*";if(p.location)txt+="\n   📍 "+p.location;if(p.phone)txt+="\n   📱 "+p.phone;txt+="\n   "+p.desc+"\n   "+fmt(p.amount)+" · "+(PN[p.paytype]||p.paytype)+"\n";if(!p.facturaImg)txt+="   ⚠️ Sin factura\n";});});
  txt+="\n"+"─".repeat(28)+"\n✅ *TOTAL: "+fmt(list.reduce((a,p)=>a+p.amount,0))+"* · "+list.length+" pedidos\n¡Carnes Frescas Siempre! 🥩";
  navigator.clipboard.writeText(txt).then(()=>{showToast("Copiado ✓ — pégalo en WhatsApp");APP.modal=null;render();}).catch(()=>showToast("No se pudo copiar — intenta en Chrome"));
}

render();

</script>
</body>
</html>
